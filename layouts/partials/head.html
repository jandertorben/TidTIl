<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} – {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="theme-color" content="#f7f3ea">
  <meta property="og:title" content="{{ if .Title }}{{ .Title }} – {{ end }}{{ site.Title }}">
  <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ "images/tidtil-sync-livingroom.webp" | absURL }}">
  <meta property="og:locale" content="de_DE">
  <meta name="apple-mobile-web-app-title" content="TidTil">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="/icons/tidtil-icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/site.css">
</head>
